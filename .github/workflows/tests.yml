name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # No `playwright install chromium` here on purpose: the whole suite is
      # offline/mocked (see conftest.py + every test file) — nothing ever
      # launches a real browser, so there's nothing for Chromium to do here.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
        
